---
- name: Prepare happy-path device state
  hosts: sandbox
  gather_facts: false

  tasks:
    - name: Set hostname
      cisco.ios.ios_config:
        lines:
          - hostname {{ inventory_hostname }}

    - name: Configure Loopback0
      cisco.ios.ios_config:
        parents:
          - interface Loopback0
        lines:
          - ip address 10.10.10.1 255.255.255.255

    - name: Configure VTY lines
      cisco.ios.ios_config:
        parents:
          - line vty 0 4
        lines:
          - transport input ssh

    - name: Configure NTP servers
      cisco.ios.ios_config:
        lines:
          - ntp server 192.0.2.10
          - ntp server 192.0.2.11
